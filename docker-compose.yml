services:
  postgres:
    image: postgres:15   
    container_name: postgres
    environment:
      - POSTGRES_USER=mtsouk
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=master
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - psql
    ports:
      - "5432:5432"

volumes:
  postgres_data:

networks:
  psql:
    driver: bridge